version: 0.2

phases:
install:
runtime-versions:
java: corretto17

pre_build:
commands:
- echo Logging in to Amazon ECR...
- aws --version
- $(aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 703651067822.dkr.ecr.us-east-1.amazonaws.com/spring-app)

build:
commands:
- mvn clean package -DskipTests
- docker build -t spring-app .
- docker tag spring-app:latest 703651067822.dkr.ecr.us-east-1.amazonaws.com/spring-app:latest

post_build:
commands:
- docker push 703651067822.dkr.ecr.us-east-1.amazonaws.com/spring-app:latest

artifacts:
files:
- '**/*'

